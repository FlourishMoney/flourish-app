name: MATH-LOCK

# The math test gate. Runs on every push and PR to main and publishes the "math" status check that
# branch protection requires; a red check here MUST block merge to main (see DEPLOY.md).
#
# npm ci IS required. The original suites imported only src/lib/*.js with zero runtime deps, so the
# first version of this workflow skipped installing. That is no longer true: the gate now includes
# forecastNaN, whose forecast path transitively imports @capacitor/local-notifications
# (notificationPlanner -> notifications). Without node_modules the run dies with ERR_MODULE_NOT_FOUND
# before that suite executes — an ~11s death that looks nothing like a test failure.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job name is the status-check context branch protection matches — keep it "math".
  math:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run MATH-LOCK suites
        run: npm run test:math
