[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect: app calls /api/coach → Netlify function
[[redirects]]
  from   = "/api/coach"
  to     = "/.netlify/functions/coach"
  status = 200

# SPA fallback — all routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
