[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION           = "18"
  SECRETS_SCAN_OMIT_KEYS = "PLAID_ENV"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' cdn.plaid.com *.plaid.com; connect-src 'self' api.anthropic.com cdn.plaid.com production.plaid.com sandbox.plaid.com *.plaid.com qhcccjkmvijrybagkvyw.supabase.co *.ingest.sentry.io *.sentry.io; style-src 'self' 'unsafe-inline' *.plaid.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: *.plaid.com; frame-src *.plaid.com cdn.plaid.com; worker-src 'self' blob:;"

# The self-unregistering kill-switch SW (public/sw.js) must NEVER be cached, so a returning visitor's
# browser re-fetches it on its next service-worker update check and retires the old (pre-Vite) zombie
# worker. A real file at /sw.js is served directly and takes precedence over the SPA fallback below.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Redirect: app calls /api/coach → Netlify function
[[redirects]]
  from   = "/api/coach"
  to     = "/.netlify/functions/coach"
  status = 200

# Redirect: app calls /api/plaid → Netlify function
[[redirects]]
  from   = "/api/plaid"
  to     = "/.netlify/functions/plaid"
  status = 200

# Redirect: app calls /api/beta → Netlify function
[[redirects]]
  from   = "/api/beta"
  to     = "/.netlify/functions/beta"
  status = 200

# SPA fallback — all routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
