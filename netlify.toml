[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION           = "18"
  SECRETS_SCAN_OMIT_KEYS = "PLAID_ENV"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.plaid.com *.plaid.com; connect-src 'self' api.anthropic.com cdn.plaid.com production.plaid.com sandbox.plaid.com *.plaid.com qhcccjkmvijrybagkvyw.supabase.co; style-src 'self' 'unsafe-inline' *.plaid.com; img-src 'self' data: *.plaid.com; frame-src *.plaid.com cdn.plaid.com; worker-src blob:;"

# Redirect: app calls /api/coach → Netlify function
[[redirects]]
  from   = "/api/coach"
  to     = "/.netlify/functions/coach"
  status = 200

# Redirect: app calls /api/plaid → Netlify function
[[redirects]]
  from   = "/api/plaid"
  to     = "/.netlify/functions/plaid"
  status = 200

# SPA fallback — all routes → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
